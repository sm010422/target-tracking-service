<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>C4I 지휘통제 대시보드</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        body {
            background: #0a0a0a;
            color: #00ff41;
            font-family: monospace;
            padding: 20px;
        }
        h1 { color: #00ff41; border-bottom: 1px solid #00ff41; }
        #status { color: #ffff00; margin-bottom: 10px; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #00ff41;
            padding: 8px 12px;
            text-align: left;
        }
        th { background: #001a00; }
        tr:hover { background: #001a00; }
        .detected { color: #00ff41; }
    </style>
</head>
<body>
    <h1>📡 C4I 실시간 전술 대시보드</h1>
    <div id="status">🔴 연결 중...</div>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>타입</th>
                <th>위도</th>
                <th>경도</th>
                <th>고도(m)</th>
                <th>속도(km/h)</th>
                <th>상태</th>
            </tr>
        </thead>
        <tbody id="target-table"></tbody>
    </table>

    <script>
        const targets = {};

        const socket = new SockJS('/ws');
        const stompClient = Stomp.over(socket);

        stompClient.connect({}, function(frame) {
            document.getElementById('status').innerHTML = '🟢 연결됨';

            stompClient.subscribe('/topic/targets', function(message) {
                const target = JSON.parse(message.body);
                targets[target.targetId] = target;
                renderTable();
            });
        }, function(error) {
            document.getElementById('status').innerHTML = '🔴 연결 끊김: ' + error;
        });

        function renderTable() {
            const tbody = document.getElementById('target-table');
            tbody.innerHTML = '';
            Object.values(targets).forEach(t => {
                tbody.innerHTML += `
                    <tr>
                        <td>${t.targetId}</td>
                        <td>${t.targetType}</td>
                        <td>${t.latitude.toFixed(5)}</td>
                        <td>${t.longitude.toFixed(5)}</td>
                        <td>${t.altitude.toFixed(1)}</td>
                        <td>${t.speed.toFixed(1)}</td>
                        <td class="detected">${t.status}</td>
                    </tr>`;
            });
        }
    </script>
</body>
</html>
