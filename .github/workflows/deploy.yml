name: Deploy target-tracking-service

on:
  push:
    branches: [ "main" ]
    paths:
      - 'src/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'Dockerfile'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: 🧪 Build target-tracking-service
    runs-on: ubuntu-24.04-arm
    outputs:
      image_tag: ${{ steps.meta.outputs.sha }}
    steps:
      - name: ✅ Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Set image tag
        id: meta
        run: echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/target-tracking-service:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/target-tracking-service:latest
